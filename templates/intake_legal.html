{% extends "base.html" %}
{% block title %}NC Legal Intake{% endblock %}
{% block content %}
<div class="card">
  <h2>NC — Legal Intake</h2>
  <p class="muted">Subscriber: {{ subscriber_email }}</p>

  <form method="post" action="/intake?token={{ token }}" class="form">
    <label>Your name</label>
    <input name="name" required>

    <label>Your email</label>
    <input name="email" type="email" required>

    <label>Service requested</label>
    <input name="service_requested" required placeholder="Contract review, demand letter, records request...">

    <label>Notes</label>
    <textarea name="notes" rows="6"></textarea>

    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Submit</button>
      <a class="btn" href="/dashboard?token={{ token }}">Back</a>
    </div>
  </form>
</div>
{% endblock %}

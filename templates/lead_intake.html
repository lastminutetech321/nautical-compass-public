{% extends "base.html" %}
{% block title %}Contact • Nautical Compass{% endblock %}
{% block content %}
<div class="card">
  <h2>General Inquiry</h2>
  <p class="muted">Short message. We’ll route it correctly.</p>

  <form method="post" action="/lead" class="form">
    <label>Name</label>
    <input name="name" required>

    <label>Email</label>
    <input name="email" type="email" required>

    <label>Phone (optional)</label>
    <input name="phone">

    <label>Company (optional)</label>
    <input name="company">

    <label>What are you trying to solve?</label>
    <input name="interest" placeholder="Legal intake, production staffing, partnerships…">

    <label>Message</label>
    <textarea name="message" rows="5" placeholder="Give the short version."></textarea>

    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Send</button>
      <a class="btn" href="/services">Back to Solutions</a>
    </div>
  </form>
</div>
{% endblock %}

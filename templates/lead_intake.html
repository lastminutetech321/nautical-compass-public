{% extends "base.html" %}
{% block title %}Lead Intake{% endblock %}
{% block content %}
<div class="card">
  <h2>Public Lead Intake</h2>
  <p class="muted">Not ready to subscribe? Send a general inquiry.</p>

  <form class="form" method="post" action="/lead">
    <div><div class="label">Name</div><input name="name" required></div>
    <div><div class="label">Email</div><input name="email" type="email" required></div>
    <div><div class="label">Interest</div><input name="interest" placeholder="Legal / AV / Trades / Other"></div>
    <div><div class="label">Message</div><textarea name="message"></textarea></div>
    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Submit</button>
      <a class="btn" href="/">Back</a>
    </div>
  </form>
</div>
{% endblock %}

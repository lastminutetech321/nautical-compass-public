{% extends "base.html" %}
{% block title %}Member Dashboard{% endblock %}
{% block content %}
<div class="card">
  <h2>Member Dashboard</h2>
  <p class="muted">Authorized email: <b>{{ email }}</b></p>

  <div class="grid grid-2">
    <div class="card">
      <h3>Member Intake</h3>
      <p class="muted">Submit a structured request.</p>
      <div class="btnrow">
        <a class="btn btn-primary" href="/intake-form?token={{ token }}">Open Intake</a>
      </div>
    </div>
    <div class="card">
      <h3>Dashboards</h3>
      <p class="muted">Explore role dashboards.</p>
      <div class="btnrow">
        <a class="btn" href="/dashboards">Open Dashboards</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<section class="page-section">
  <div class="hero-card">
    <div class="eyebrow">Career DNA</div>
    <h2>Start Worker Profile</h2>
    <p class="hero-copy">
      Build the first layer of worker identity for role matching, dispatch readiness, and long-term Career DNA memory.
    </p>
  </div>

  <div class="feature-card" style="margin-top: 24px;">
    <form method="post" action="/labor/profile/start" class="stack" style="display:grid; gap:16px;">
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div>
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="text" />
      </div>

      <div>
        <label for="primary_role">Primary Role</label>
        <input id="primary_role" name="primary_role" type="text" required />
      </div>

      <div>
        <label for="market_area">Market Area</label>
        <input id="market_area" name="market_area" type="text" required />
      </div>

      <div>
        <label for="certifications">Certifications</label>
        <textarea id="certifications" name="certifications" rows="4" placeholder="Comma-separated"></textarea>
      </div>

      <div>
        <label for="availability">Availability</label>
        <input id="availability" name="availability" type="text" />
      </div>

      <div class="actions" style="display:flex; gap:12px; flex-wrap:wrap;">
        <button class="btn" type="submit">Start Career DNA</button>
        <a class="feature-link" href="/modules/labor-signal">Back to Labor Signal ↗</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}

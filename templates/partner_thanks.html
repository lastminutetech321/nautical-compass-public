{% extends "base.html" %}
{% block title %}Partner Port{% endblock %}

{% block content %}
<div class="page-shell">

<h1>Partner Intake</h1>

<form method="post" enctype="multipart/form-data">

<label>Company</label>
<input type="text" name="company" required>

<label>Service Type</label>
<input type="text" name="service_type" required>

<label>Territory</label>
<input type="text" name="territory" required>

<label>Upload Capability Documents</label>
<input type="file" name="documents" multiple>

<button type="submit">Submit Partner Application</button>

</form>

</div>
{% endblock %}

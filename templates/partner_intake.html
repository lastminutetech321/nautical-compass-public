{% extends "base.html" %}
{% block title %}Partner Intake{% endblock %}
{% block content %}
<div class="card">
  <h2>Partner Intake</h2>
  <p class="muted">Manufacturers / vendors / providers: submit to be routed into sponsor or vendor rails.</p>

  <form class="form" method="post" action="/partner">
    <div><div class="label">Name</div><input name="name" required></div>
    <div><div class="label">Email</div><input name="email" type="email" required></div>
    <div><div class="label">Company</div><input name="company"></div>
    <div><div class="label">Role</div><input name="role" placeholder="Regional sales / vendor / manufacturer"></div>
    <div><div class="label">Product Type</div><input name="product_type" placeholder="LED wall / lighting / audio / staging"></div>
    <div><div class="label">Regions</div><input name="regions" placeholder="DMV / East Coast / National"></div>
    <div><div class="label">Message</div><textarea name="message"></textarea></div>

    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Submit</button>
      <a class="btn" href="/">Back</a>
    </div>
  </form>
</div>
{% endblock %}

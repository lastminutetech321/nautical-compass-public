<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Nautical Compass{% endblock %}</title>

  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/styles.css?v=999" />
  {% block head %}{% endblock %}
</head>

<body>
  <header class="nav glass moist">
    <div class="nav-inner">
      <a class="brand" href="/">
        <span class="brand-badge">NC</span>
        <span class="brand-text">Nautical Compass</span>
      </a>

      <nav class="nav-links" aria-label="Primary">
        <a href="/hall">Hall</a>
        <a href="/services">Services</a>
        <a href="/dashboards">Dashboards</a>
        <a href="/lead">Lead Intake</a>
        <a href="/partner">Partners</a>
        <a href="/sponsor">Sponsors</a>
        <a class="tab-primary" href="/checkout">Get Access</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-row">
      <div>© 2026 Nautical Compass</div>
      <div class="muted">One system · Many lanes · Built for clarity under pressure</div>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>

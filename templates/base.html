<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}Nautical Compass{% endblock %}</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">NC</span>
        <span class="brand-text">Nautical Compass</span>
      </a>
      <nav class="nav">
        <a href="/services">Services</a>
        <a href="/intake/production">Production</a>
        <a href="/intake/labor">Labor</a>
        <a href="/contributor">Contributors</a>
      </nav>
    </div>
  </header>

  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="wrap footer-inner">
      <div class="muted">© {{ year }} Nautical Compass</div>
      <div class="muted">One hall · many doors · structured rails</div>
    </div>
  </footer>
</body>
</html>

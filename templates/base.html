<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nautical Compass</title>

<style>

body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color:white;

    /* Real background image (replace with water scene) */
    background-image:url("background-water.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* main layout */

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
    padding:40px;
}

/* clear glass panel */

.glass-panel{
    position:relative;

    padding:30px;

    border-radius:18px;

    background:rgba(255,255,255,0.03);

    border:1px solid rgba(255,255,255,0.45);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.6),
    inset 0 -1px 0 rgba(255,255,255,0.2);
}

/* polished glass highlight */

.glass-panel::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:60%;

    border-radius:18px;

    background:linear-gradient(
        120deg,
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.01)
    );

    pointer-events:none;
}

/* bronze headers */

.panel-title{
    font-size:20px;
    letter-spacing:1px;

    color:#d6a25a;

    margin-bottom:20px;
}

/* content area */

.panel-body{
    font-size:14px;
    line-height:1.6;
    opacity:.9;
}

/* navigation bar */

.navbar{
    height:70px;
    display:flex;
    align-items:center;
    padding:0 40px;

    background:rgba(0,0,0,.35);

    border-bottom:1px solid rgba(255,255,255,.15);
}

.logo{
    font-size:20px;
    color:#d6a25a;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Nautical Compass</div>
</div>

<div class="dashboard">

    <div class="glass-panel">
        <div class="panel-title">Case Dock</div>
        <div class="panel-body">
            Active legal matters and filings appear here.
        </div>
    </div>

    <div class="glass-panel">
        <div class="panel-title">Signal Dock</div>
        <div class="panel-body">
            Alerts, notices, and incoming signals.
        </div>
    </div>

    <div class="glass-panel">
        <div class="panel-title">Equity Engine</div>
        <div class="panel-body">
            Equity analysis and strategic tools.
        </div>
    </div>

    <div class="glass-panel">
        <div class="panel-title">Navigator AI</div>
        <div class="panel-body">
            AI assistant guidance and commands.
        </div>
    </div>

</div>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Nautical Compass{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/styles.css?v={{ v }}" />
  {% block head %}{% endblock %}
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="/">
      <span class="brand-badge">NC</span>
      <span class="brand-text">Nautical Compass</span>
    </a>

    <nav class="nav-links">
      <a href="/hall">Hall</a>
      <a href="/services">Services</a>
      <a href="/dashboards">Dashboards</a>
      <a href="/lead">Lead Intake</a>
      <a href="/partner">Partners</a>
      <a href="/sponsor">Sponsors</a>
      <a class="tab-primary" href="/checkout">Get Access</a>
    </nav>
  </div>

  <div class="soundbar">
    <button id="soundToggle" class="soundbtn" type="button" aria-pressed="false">Sound: Off</button>
    <span class="soundhint">Ocean ambience (tap to enable)</span>
  </div>
</header>

<audio id="oceanAudio" preload="none" loop>
  <source src="/static/ocean.mp3" type="audio/mpeg">
</audio>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div class="footer-row">
    <div>© 2026 Nautical Compass</div>
    <div class="muted">One system · Many lanes · Built for clarity under pressure</div>
  </div>
</footer>

<script>
(function () {
  const btn = document.getElementById("soundToggle");
  const audio = document.getElementById("oceanAudio");
  if (!btn || !audio) return;

  let on = false;

  function render() {
    btn.textContent = on ? "Sound: On" : "Sound: Off";
    btn.setAttribute("aria-pressed", on ? "true" : "false");
  }

  async function setOn(next) {
    on = next;
    render();
    try {
      if (on) {
        audio.volume = 0.28;
        await audio.play();
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    } catch (e) {
      on = false;
      render();
    }
  }

  render();
  btn.addEventListener("click", function () {
    setOn(!on);
  });
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Nautical Compass{% endblock %}</title>

  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/static/styles.css" />

  {% block head %}{% endblock %}
</head>

<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">NC</span>
        <span class="brand-text">Nautical Compass</span>
      </a>

      <nav class="nav">
        <a href="/services">Services</a>
        <a href="/dashboards">Dashboards</a>
        <a href="/lead">Lead Intake</a>
        <a href="/partner">Partners</a>
        <a href="/get-access" class="btn btn-primary">Get Access</a>
      </nav>
    </div>
  </header>

  {% block hero %}{% endblock %}

  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div>© {{ year if year else "" }} Nautical Compass</div>
    <div>Structured intake · Clear rails · Secure checkout</div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>

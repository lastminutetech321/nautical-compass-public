{% extends "base.html" %}
{% block title %}Labor Intake • Nautical Compass{% endblock %}

{% block content %}
<div class="card">
  <h2>Labor / Tech Intake (LMT Worker Lane)</h2>
  <p class="muted">This intake extracts readiness + matching signals without feeling like paperwork.</p>

  <form class="form" method="post" action="/intake/labor">
    <div class="grid grid-2">
      <div>
        <label class="label">Name</label>
        <input name="name" required>
      </div>
      <div>
        <label class="label">Email</label>
        <input name="email" type="email" required>
      </div>
      <div>
        <label class="label">Phone</label>
        <input name="phone">
      </div>
      <div>
        <label class="label">Home City</label>
        <input name="home_city" required>
      </div>
      <div>
        <label class="label">Roles (comma separated)</label>
        <input name="roles" placeholder="A2, A1, V1, L1, Stagehand…" required>
      </div>
      <div>
        <label class="label">Experience Level</label>
        <select name="experience_level" required>
          <option>Entry</option>
          <option>Intermediate</option>
          <option>Advanced</option>
          <option>Lead</option>
        </select>
      </div>
      <div>
        <label class="label">Availability (days/week)</label>
        <select name="availability_days" required>
          <option>0-2</option>
          <option>3</option>
          <option>4-5</option>
          <option>6-7</option>
        </select>
      </div>
      <div>
        <label class="label">Transport</label>
        <select name="has_transport" required>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>
      <div>
        <label class="label">Certs (OSHA/rigging/etc)</label>
        <select name="has_certs" required>
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>
      <div>
        <label class="label">LLC / Business Setup</label>
        <select name="has_llc" required>
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>
      <div>
        <label class="label">Insurance (COI/Pro coverage)</label>
        <select name="has_insurance" required>
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>
      <div>
        <label class="label">Minimum Rate</label>
        <input name="rate_min" placeholder="$45/hr" required>
      </div>
    </div>

    <div>
      <label class="label">Notes</label>
      <textarea name="notes" placeholder="Special skills, limitations, preferred venues…"></textarea>
    </div>

    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Submit Labor Intake</button>
      <a class="btn" href="/services">Back</a>
    </div>
  </form>
</div>
{% endblock %}

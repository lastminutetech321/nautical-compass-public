{% extends "base.html" %}
{% block title %}Production Intake • Nautical Compass{% endblock %}

{% block content %}
<div class="card">
  <h2>Production Intake (AVPT Client Lane)</h2>
  <p class="muted">This intake extracts the data needed to scope, staff, and prevent failures.</p>

  <form class="form" method="post" action="/intake/production">
    <div class="grid grid-2">
      <div>
        <label class="label">Company Name</label>
        <input name="company_name" required>
      </div>
      <div>
        <label class="label">Contact Name</label>
        <input name="contact_name" required>
      </div>
      <div>
        <label class="label">Email</label>
        <input name="email" type="email" required>
      </div>
      <div>
        <label class="label">Phone</label>
        <input name="phone">
      </div>
      <div>
        <label class="label">City</label>
        <input name="city" required>
      </div>
      <div>
        <label class="label">Event Type</label>
        <select name="event_type" required>
          <option>Corporate</option>
          <option>Concert</option>
          <option>Tradeshow</option>
          <option>Private</option>
          <option>One-off</option>
        </select>
      </div>
      <div>
        <label class="label">Event Date</label>
        <input name="event_date" placeholder="YYYY-MM-DD" required>
      </div>
      <div>
        <label class="label">Crew Needed (roles)</label>
        <input name="crew_needed" placeholder="A1, V1, L1, Stagehands, etc" required>
      </div>
      <div>
        <label class="label">Budget Range</label>
        <select name="budget_range" required>
          <option>Low</option>
          <option>Mid</option>
          <option>High</option>
          <option>Premium</option>
        </select>
      </div>
      <div>
        <label class="label">Scope Clarity</label>
        <select name="scope_clarity" required>
          <option>Clear</option>
          <option>Somewhat clear</option>
          <option>Unclear</option>
          <option>Not sure</option>
        </select>
      </div>
      <div>
        <label class="label">PO / Authorization Ready?</label>
        <select name="po_ready" required>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>
      <div>
        <label class="label">COI Required?</label>
        <select name="coi_required" required>
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>
      <div>
        <label class="label">Timeline</label>
        <select name="timeline" required>
          <option>Standard (1-2 weeks)</option>
          <option>Rush (24-48h)</option>
          <option>Emergency (same-day)</option>
        </select>
      </div>
    </div>

    <div>
      <label class="label">Notes</label>
      <textarea name="notes" placeholder="Venue, power constraints, load-in/out, special constraints…"></textarea>
    </div>

    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Submit Production Intake</button>
      <a class="btn" href="/services">Back</a>
    </div>
  </form>
</div>
{% endblock %}

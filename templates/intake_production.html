{% extends "base.html" %}
{% block title %}AVPT Production Intake{% endblock %}
{% block content %}
<div class="card">
  <h2>AVPT — Production / Client Intake</h2>
  <p class="muted">
    This intake is built to prevent the common failures: unclear roles, missing logistics, and payment disputes.
  </p>

  <form method="post" action="/intake/production" class="form">
    <div class="grid2">
      <div>
        <label>Company name</label>
        <input name="company_name" required>
      </div>
      <div>
        <label>Contact name</label>
        <input name="contact_name" required>
      </div>
    </div>

    <div class="grid2">
      <div>
        <label>Email</label>
        <input name="email" type="email" required>
      </div>
      <div>
        <label>Phone</label>
        <input name="phone">
      </div>
    </div>

    <label>Website</label>
    <input name="website">

    <hr class="hr">

    <div class="grid2">
      <div>
        <label>Event name</label>
        <input name="event_name">
      </div>
      <div>
        <label>Venue name</label>
        <input name="venue_name">
      </div>
    </div>

    <div class="grid2">
      <div>
        <label>City</label>
        <input name="city">
      </div>
      <div>
        <label>State</label>
        <input name="state" placeholder="DC / MD / VA...">
      </div>
    </div>

    <div class="grid3">
      <div>
        <label>Load-in date</label>
        <input name="load_in_date" placeholder="YYYY-MM-DD">
      </div>
      <div>
        <label>Show date</label>
        <input name="show_date" placeholder="YYYY-MM-DD">
      </div>
      <div>
        <label>Load-out date</label>
        <input name="load_out_date" placeholder="YYYY-MM-DD">
      </div>
    </div>

    <div class="grid2">
      <div>
        <label>Call time</label>
        <input name="call_time" placeholder="e.g., 07:00">
      </div>
      <div>
        <label>Wrap time</label>
        <input name="wrap_time" placeholder="e.g., 22:00">
      </div>
    </div>

    <label>Crew needed (roles)</label>
    <textarea name="crew_needed" rows="3" placeholder="A1, A2, V1, LD, PM, Stagehands, Riggers..."></textarea>

    <label>Gear needed (optional)</label>
    <textarea name="gear_needed" rows="3" placeholder="LED wall, consoles, intercom, comms, distro..."></textarea>

    <hr class="hr">

    <div class="grid2">
      <div>
        <label>Truck needed</label>
        <input name="truck_needed" placeholder="Sprinter / Box Truck / Tractor / None">
      </div>
      <div>
        <label>Budget range</label>
        <input name="budget_range" placeholder="$ / day or total range">
      </div>
    </div>

    <div class="grid3">
      <label class="check"><input type="checkbox" name="lift_gate"> Lift gate required</label>
      <label class="check"><input type="checkbox" name="dock_access"> Dock access confirmed</label>
      <label class="check"><input type="checkbox" name="union_required"> Union required</label>
    </div>

    <label>Payment terms</label>
    <input name="payment_terms" placeholder="Deposit / Net 7 / Net 14 / Same-day, etc.">

    <label>Notes</label>
    <textarea name="notes" rows="4"></textarea>

    <div class="btnrow">
      <button class="btn btn-primary" type="submit">Submit</button>
      <a class="btn" href="/services#av">Back</a>
    </div>
  </form>
</div>
{% endblock %}
